name: Deploy Backend to Fly.io

# Deploys the backend whenever its code changes on main.
# Voraussetzung: FLY_API_TOKEN in GitHub Repo Secrets gesetzt
# (Token erstellen: `flyctl tokens create deploy`)

on:
  push:
    branches: [main]
    paths:
      - 'immo-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-backend
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - working-directory: ./immo-backend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
